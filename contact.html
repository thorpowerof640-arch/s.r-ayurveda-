<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - S.R. Ayurveda</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 text-gray-800">

    <header class="bg-emerald-800 text-white py-4 shadow">
        <div class="container mx-auto px-4 flex justify-between">
            <h1 class="text-2xl font-bold">S.R. Ayurveda</h1>
            <nav class="space-x-4">
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="about.html">About Us</a>
                <a href="contact.html" class="text-amber-300 font-bold">Contact Us</a>
            </nav>
        </div>
    </header>

    <div class="container mx-auto px-4 py-10 max-w-5xl">
        <h2 class="text-3xl font-bold text-emerald-900 mb-8 text-center">Sampark Karein (Contact Us)</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Contact Info -->
            <div class="bg-white p-6 rounded shadow space-y-4">
                <h3 class="text-xl font-bold text-emerald-800">Company Details</h3>
                <p><strong>Website:</strong> S.R.ayurveda.com</p>
                <p><strong>Email:</strong> support@S.R.ayurveda.com</p>
                <p><strong>Phone:</strong> +91 98765 43210</p>
                <p><strong>Address:</strong> S.R. Ayurveda Pvt. Ltd., Herbal Market, Haridwar, Uttarakhand, India.</p>
            </div>

            <!-- Contact Form -->
            <form class="bg-white p-6 rounded shadow space-y-4">
                <div>
                    <label class="block mb-1 font-medium">Aapka Naam</label>
                    <input type="text" class="w-full border p-2 rounded focus:outline-emerald-800" placeholder="Naam likhein" required>
                </div>
                <div>
                    <label class="block mb-1 font-medium">Mobile Number</label>
                    <input type="tel" class="w-full border p-2 rounded focus:outline-emerald-800" placeholder="Phone number" required>
                </div>
                <div>
                    <label class="block mb-1 font-medium">Sandesh (Message)</label>
                    <textarea class="w-full border p-2 rounded h-24 focus:outline-emerald-800" placeholder="Aapki samsya ya query likhein..."></textarea>
                </div>
                <button type="submit" class="bg-emerald-800 text-white py-2 px-6 rounded font-bold hover:bg-emerald-900">Send Message</button>
            </form>
        </div>
    </div>

</body>
</html>
